name: Daily Stock ETL Pipeline

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
    - name: Fetch latest GitHub code
      uses: actions/checkout@v4

    - name: Init Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r packages/data-python/scripts/requirements.txt

    - name: Run Pipeline
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_PORT: ${{ secrets.DB_PORT }}
        DB_NAME: ${{ secrets.DB_NAME }}
      run: |
        python packages/data-python/scripts/daily_etl_pipeline.py