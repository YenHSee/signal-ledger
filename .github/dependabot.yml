version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly

    groups:
      javascript-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"

      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"

      - dependency-name: "@eslint/js"
        update-types:
          - "version-update:semver-major"

      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: pip
    directory: /packages/data-python
    schedule:
      interval: weekly

    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
